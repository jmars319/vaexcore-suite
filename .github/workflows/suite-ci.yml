name: Suite CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Contract checks
        run: |
          echo "::group::Clone app repos"
          ./scripts/clone-or-update-apps.sh
          echo "::endgroup::"

          echo "::group::Validate app repo branches"
          node scripts/check-suite-repos.mjs
          echo "::endgroup::"

          echo "::group::Run suite contract tests"
          node --test scripts/tests/*.test.mjs
          node scripts/validate-suite-config.mjs
          node scripts/generate-suite-protocol.mjs --check
          node scripts/smoke-suite-contracts.mjs
          echo "::endgroup::"

          echo "::group::Validate release and Windows scripts"
          node scripts/check-release-env.mjs
          node scripts/check-automation-boundary.mjs
          node scripts/check-windows-suite-scripts.mjs
          echo "::endgroup::"

  release-fixtures:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Release fixture checks
        run: |
          echo "::group::Clone app repos"
          ./scripts/clone-or-update-apps.sh
          echo "::endgroup::"

          echo "::group::Validate app repo branches"
          node scripts/check-suite-repos.mjs
          echo "::endgroup::"

          echo "::group::Run release fixture tests"
          node --test \
            scripts/tests/release-manifest.test.mjs \
            scripts/tests/heartbeat-validation.test.mjs \
            scripts/tests/mac-artifact-inspection.test.mjs \
            scripts/tests/windows-manifest.test.mjs \
            scripts/tests/protocol-parity.test.mjs \
            scripts/tests/suite-contract-fixtures.test.mjs
          echo "::endgroup::"

  integration-smoke:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: rustup default stable
      - run: corepack enable
      - name: Integration smoke
        shell: bash
        run: |
          set -o pipefail
          LOG_DIR="${RUNNER_TEMP}/vaexcore-suite-ci"
          mkdir -p "$LOG_DIR"
          {
            echo "::group::Clone app repos"
            ./scripts/clone-or-update-apps.sh
            echo "::endgroup::"

            echo "::group::Validate app repo branches"
            node scripts/check-suite-repos.mjs
            echo "::endgroup::"

            echo "::group::Install app dependencies"
            (cd studio && npm ci)
            (cd pulse && pnpm install --frozen-lockfile)
            (cd console/VaexCore && npm ci)
            echo "::endgroup::"

            echo "::group::Run integration smoke"
            ./scripts/smoke-all.sh
            echo "::endgroup::"
          } 2>&1 | tee "$LOG_DIR/integration-smoke.log"
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: suite-integration-smoke-debug
          path: |
            ${{ runner.temp }}/vaexcore-suite-ci
            dist/**/*.json
            dist/**/*.log
            pulse/apps/desktopapp/src-tauri/resources/pulse-service-bundle.json
          if-no-files-found: ignore

  windows-launchers:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Parse Windows suite scripts
        run: node scripts/check-windows-suite-scripts.mjs --require-pwsh
      - name: Validate Windows artifact fixtures
        run: node --test scripts/tests/windows-manifest.test.mjs scripts/tests/windows-readme-template.test.mjs
