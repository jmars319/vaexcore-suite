name: Suite CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Contract checks
        run: |
          echo "::group::Clone app repos"
          ./scripts/clone-or-update-apps.sh --include-services
          echo "::endgroup::"

          echo "::group::Validate app repo branches"
          node scripts/check-suite-repos.mjs
          node scripts/check-suite-services.mjs
          echo "::endgroup::"

          echo "::group::Run suite contract tests"
          node --test scripts/tests/*.test.mjs
          node scripts/audit-maintainability.mjs --strict
          node scripts/validate-suite-config.mjs
          node scripts/generate-suite-protocol.mjs --check
          node scripts/smoke-suite-contracts.mjs
          echo "::endgroup::"

          echo "::group::Validate release and Windows scripts"
          node scripts/check-release-env.mjs
          node scripts/check-automation-boundary.mjs
          node scripts/check-windows-suite-scripts.mjs
          echo "::endgroup::"

  release-fixtures:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Release fixture checks
        run: |
          echo "::group::Clone app repos"
          ./scripts/clone-or-update-apps.sh
          echo "::endgroup::"

          echo "::group::Validate app repo branches"
          node scripts/check-suite-repos.mjs
          echo "::endgroup::"

          echo "::group::Run release fixture tests"
          node --test \
            scripts/tests/release-manifest.test.mjs \
            scripts/tests/heartbeat-validation.test.mjs \
            scripts/tests/mac-artifact-inspection.test.mjs \
            scripts/tests/windows-manifest.test.mjs \
            scripts/tests/protocol-parity.test.mjs \
            scripts/tests/suite-contract-fixtures.test.mjs
          echo "::endgroup::"

  integration-smoke:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: rustup default stable
      - run: corepack enable
      - name: Prepare integration smoke logs
        shell: bash
        run: |
          LOG_DIR="${RUNNER_TEMP}/vaexcore-suite-ci"
          mkdir -p "$LOG_DIR"
          : > "$LOG_DIR/integration-smoke.log"
          echo "SUITE_CI_LOG_DIR=$LOG_DIR" >> "$GITHUB_ENV"
      - name: Clone app repos for integration smoke
        shell: bash
        run: |
          set -o pipefail
          ./scripts/clone-or-update-apps.sh --include-services 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Validate app repo branches and services
        shell: bash
        run: |
          set -o pipefail
          {
            node scripts/check-suite-repos.mjs
            node scripts/check-suite-services.mjs
          } 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Install Studio dependencies
        shell: bash
        run: |
          set -o pipefail
          (cd studio && npm ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Install Pulse dependencies
        shell: bash
        run: |
          set -o pipefail
          (cd pulse && pnpm install --frozen-lockfile) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Install Console dependencies
        shell: bash
        run: |
          set -o pipefail
          (cd console && npm ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Install Relay dependencies
        shell: bash
        run: |
          set -o pipefail
          (cd relay && npm ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Run suite config and contract smoke
        shell: bash
        run: |
          set -o pipefail
          {
            node --test scripts/tests/*.test.mjs
            node scripts/validate-suite-config.mjs --require-local-repos
            node scripts/check-suite-repos.mjs
            node scripts/check-suite-services.mjs
            node scripts/generate-suite-protocol.mjs --check
            node scripts/smoke-suite-contracts.mjs
          } 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Check bot readiness
        shell: bash
        run: |
          set -o pipefail
          node scripts/check-bot-readiness.mjs 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Run Studio CI
        shell: bash
        run: |
          set -o pipefail
          (cd studio && npm run ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Run Pulse CI
        shell: bash
        run: |
          set -o pipefail
          (cd pulse && pnpm run ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - name: Run Console CI
        shell: bash
        run: |
          set -o pipefail
          (cd console && npm run ci) 2>&1 | tee -a "$SUITE_CI_LOG_DIR/integration-smoke.log"
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: suite-integration-smoke-debug
          path: |
            ${{ runner.temp }}/vaexcore-suite-ci
            dist/**/*.json
            dist/**/*.log
            pulse/apps/desktopapp/src-tauri/resources/pulse-service-bundle.json
          if-no-files-found: ignore

  windows-launchers:
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Clone app repos
        run: .\scripts\clone-or-update-apps.ps1
      - name: Validate app repo branches
        run: node scripts/check-suite-repos.mjs
      - name: Parse Windows suite scripts
        run: node scripts/check-windows-suite-scripts.mjs --require-pwsh
      - name: Validate Windows artifact fixtures
        run: node --test scripts/tests/windows-manifest.test.mjs scripts/tests/windows-readme-template.test.mjs
